# atdd-kit project configuration

platform:
  - other

spawn_profiles:
  # custom: applied by /atdd-kit:autopilot when no --profile flag is supplied.
  # All six roles pinned to sonnet for this project.
  custom:
    developer:  { model: sonnet }
    qa:         { model: sonnet }
    tester:     { model: sonnet }
    reviewer:   { model: sonnet }
    researcher: { model: sonnet }
    writer:     { model: sonnet }
