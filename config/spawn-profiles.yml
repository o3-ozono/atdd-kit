# autopilot --<profile> flag -> spawn 時の model
#
# Single source of truth for preset spawn profiles.
# commands/autopilot.md Phase 0 Argument Parsing が本ファイルを参照し
# Agent tool 呼び出しの `model` パラメータへ注入する。
#
# Scope note (Issue #109):
#   Effort dimension is out of scope for this release because the Agent tool
#   schema does not accept a per-spawn effort parameter. See CHANGELOG
#   Unreleased entry for the follow-up path.
#
# Unspecified (no flag) プロファイルは Agent tool 呼び出しから `model` を省略することで
# session default を継承させる運用のため、本ファイルには記載しない。
#
# NL profile (--profile="..." / positional NL) は本ファイルを参照せず
# main Claude が per-invocation で resolve する。

profiles:
  light:
    developer:  { model: sonnet }
    qa:         { model: sonnet }
    tester:     { model: sonnet }
    reviewer:   { model: sonnet }
    researcher: { model: sonnet }
    writer:     { model: sonnet }
  heavy:
    developer:  { model: opus }
    qa:         { model: opus }
    tester:     { model: opus }
    reviewer:   { model: opus }
    researcher: { model: opus }
    writer:     { model: opus }
