name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.swift'
              - '**/*.ts'
              - '**/*.js'
              - '**/*.py'
              - '**/*.go'
            docs:
              - '**/*.md'
              - 'docs/**'

  ci-gate:
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "CI gate passed"
