name: 開発タスク
description: コード実装・インフラ/CI・ビルド設定・バグ修正など
labels: ["type:development"]
body:
  - type: checkboxes
    id: skills
    attributes:
      label: 適用スキルチェックリスト
      options:
        - label: "atdd-kit:defining-requirements — 要件・方針整理・AC 導出"
        - label: "atdd-kit:extracting-user-stories — ユーザーストーリー抽出"
        - label: "atdd-kit:writing-plan-and-tests — 実装計画 + 受け入れテスト作成"
        - label: "atdd-kit:running-atdd-cycle — ATDD サイクル (RED → GREEN)"
        - label: "atdd-kit:reviewing-deliverables — 成果物レビュー"
        - label: "atdd-kit:merging-and-deploying — マージ & デプロイ"
  - type: textarea
    id: summary
    attributes:
      label: 痛み / 解決したい問題
      description: |
        解決したい問題・痛みを記述する（「何を実装するか」ではなく「なぜ困っているか」）。
        バグ修正の場合は現象・原因・影響箇所を記載する。
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 望む結果
      description: この Issue が完了したとき、どうなっていれば成功か。
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: スコープ境界（やる / やらない）
      description: 今回やることとやらないことを明示する。
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: ユーザーストーリー
      description: |
        ユーザーが達成したいことをユーザーの視点で記述する（任意）。
        未記入なら Claude が defining-requirements で生成する。
      placeholder: |
        **〜として、** 〜したい。
        **なぜなら、** 〜だから。
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: |
        ストーリーが「完了」と言えるために満たすべき条件を Given/When/Then 形式で記述する（任意）。
        未記入なら Claude が defining-requirements で生成する。
      placeholder: |
        ### AC1: （AC名）
        - **Given:** （前提条件）
        - **When:** （操作）
        - **Then:** （期待結果）

        ### AC2: （AC名）
        - **Given:** （前提条件）
        - **When:** （操作）
        - **Then:** （期待結果）
  - type: textarea
    id: subtasks
    attributes:
      label: サブタスクチェックリスト
      description: |
        完了に必要な全サブタスクをチェックボックス形式で列挙する（任意）。
        未記入なら Claude が defining-requirements で生成する。
      placeholder: |
        ### 実装
        - [ ] ...

        ### テスト
        - [ ] ...

        ### 仕上げ
        - [ ] ドキュメント整合性チェック
  - type: textarea
    id: completion-criteria
    attributes:
      label: 完了条件
      description: |
        AC が全て GREEN であること + 技術的な完了条件を列挙する（任意）。
        未記入なら Claude が defining-requirements で生成する。
      placeholder: |
        - [ ] AC1〜ACN が全て GREEN
        - [ ] ビルドが warning ゼロで通る
        - [ ] 既存テスト（unit / snapshot / ui）が GREEN
  - type: textarea
    id: references
    attributes:
      label: 参照ドキュメント
      description: 関連する設計ドキュメント・Issue
