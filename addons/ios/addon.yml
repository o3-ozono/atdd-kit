name: ios
display_name: iOS

skills:
  - sim-pool
  - ui-test-debugging

mcp_servers:
  XcodeBuildMCP:
    command: npx
    args: [-y, xcodebuildmcp@latest, mcp]
  ios-simulator:
    command: npx
    args: [-y, ios-simulator-mcp]
  apple-docs:
    command: npx
    args: [-y, "@kimsungwhee/apple-docs-mcp@latest"]
  xcode:
    command: xcrun
    args: [mcpbridge]

hooks:
  PreToolUse:
    - matcher: "mcp__XcodeBuildMCP__.*"
      command: .claude/hooks/sim-pool-guard.sh
      timeout: 90
    - matcher: "mcp__ios-simulator__.*"
      command: .claude/hooks/sim-pool-guard.sh
      timeout: 90

deploy:
  - src: scripts/sim-pool-guard.sh
    dest: .claude/hooks/sim-pool-guard.sh
  - src: scripts/lint-xcstrings.sh
    dest: scripts/lint-xcstrings.sh
  - src: scripts/impact_map.sh
    dest: scripts/impact_map.sh
  - src: addons/ios/config/impact_rules.yml
    dest: config/impact_rules.yml

ci_job: ci/build-and-test.yml

detect:
  patterns:
    - "*.xcodeproj"
    - "*.xcworkspace"
    - "Package.swift"

guidance: |
  Golden Image Device Set Isolation (recommended):

  Set SIM_GOLDEN_SET to enable isolation:
    export SIM_GOLDEN_SET=~/Library/Developer/CoreSimulator/GoldenDevices

  The guard will:
  1. Auto-create the Device Set directory
  2. Search for the golden image only in that Device Set
  3. Clone from the golden Device Set to the default Device Set (cross-set clone)

  Related environment variables:
    SIM_GOLDEN_SET   -- Device Set path for golden image (default: empty = default Device Set)
    SIM_DEFAULT_SET  -- Device Set path for clones (default: ~/Library/Developer/CoreSimulator/Devices)

  Impact-based test runner for iOS projects:

  1. The deployed config/impact_rules.yml maps your source paths to XCTest/XCUITest targets.
  2. REQUIRED: customize BOTH the path: globs and the skill-e2e: target names to
     match your Xcode project layout (Sources/, Tests/, UITests/, Packages/, ...).
     A path that matches no rule falls back to the FULL suite (safe but slow).
  3. Run impact-scoped tests during ATDD iteration:
       scripts/impact_map.sh --platform ios --config config/impact_rules.yml --base <ref> --layer skill-e2e
  4. At merge gate, always run the full suite (impact scope is for inner-loop speed only).
