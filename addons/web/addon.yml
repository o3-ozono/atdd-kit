name: web
display_name: Web

deploy:
  # src is resolved relative to this addon dir (addons/web/), matching the
  # discord precedent and session-start E2 Auto-Sync. impact_map.sh is the
  # shared top-level script, hence ../../scripts/...
  - src: ../../scripts/impact_map.sh
    dest: scripts/impact_map.sh
  - src: config/impact_rules.yml
    dest: config/impact_rules.yml
    # if_not_exists / merge_strategy: RESERVED fields (not yet implemented —
    # behavior deferred to a future Issue, #347). Intent: when set,
    # if_not_exists: true would skip deploying dest if it already exists
    # (protecting a user's customized config/impact_rules.yml on setup
    # re-run), and merge_strategy would define how to reconcile an updated
    # template with existing customization. No deploy-time behavior change
    # yet — setup-web.md's manual overwrite-warning step covers this today.
    if_not_exists: false
    merge_strategy: overwrite

detect:
  patterns:
    - "package.json"
    - "next.config.js"
    - "next.config.ts"
    - "nuxt.config.ts"
    - "vite.config.ts"
    - "vite.config.js"
    - "svelte.config.js"

guidance: |
  Impact-based test runner for Web projects:

  1. The deployed config/impact_rules.yml maps your source paths to test identifiers.
  2. Customize the rules to match your project structure (src/, components/, pages/, etc.).
  3. Run impact-scoped tests during ATDD iteration:
       scripts/impact_map.sh --platform web --config config/impact_rules.yml --base <ref> --layer skill-e2e
  4. At merge gate, always run the full suite:
       scripts/run-tests.sh --all

  UI/E2E test authoring (Playwright): follow the platform-independent principles in
  docs/methodology/testing/ui-e2e-foundations.md (waiting, locators, structure, granularity).
  This addon uses Playwright's built-in auto-waiting and web-first assertions; declare your
  locator school (Testing Library role-first, or data-cy) once and keep it consistent across
  this addon's suite.
