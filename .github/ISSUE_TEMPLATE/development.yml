name: Development Task
description: Code implementation, infrastructure/CI, build config, bug fixes, etc.
labels: ["type:development"]
body:
  - type: checkboxes
    id: skills
    attributes:
      label: Skill Checklist
      options:
        - label: "atdd-kit:defining-requirements — Derive requirements, approach, and AC"
        - label: "atdd-kit:extracting-user-stories — Extract user stories"
        - label: "atdd-kit:writing-plan-and-tests — Plan + acceptance tests"
        - label: "atdd-kit:running-atdd-cycle — ATDD cycle (RED → GREEN)"
        - label: "atdd-kit:reviewing-deliverables — Review deliverables"
        - label: "atdd-kit:merging-and-deploying — Merge & deploy"
  - type: textarea
    id: summary
    attributes:
      label: Pain / Problem to solve
      description: |
        Describe the pain or problem to solve (not "what to implement" but "why this hurts").
        For bug fixes, describe the symptom, cause, and affected areas.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What does success look like when this Issue is complete?
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: Scope boundary (in / out)
      description: Explicitly state what is in scope and what is out of scope for this Issue.
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: |
        Describe what the user wants to achieve, from their perspective (optional).
        Leave blank and Claude will generate it in defining-requirements.
      placeholder: |
        **I want to** [goal],
        **so that** [reason].
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: |
        Conditions that must be met for the story to be considered done (optional).
        Leave blank and Claude will generate them in defining-requirements.
      placeholder: |
        ### AC1: (name)
        - **Given:** (precondition)
        - **When:** (action)
        - **Then:** (expected result)
  - type: textarea
    id: subtasks
    attributes:
      label: Subtask Checklist
      description: |
        List all subtasks needed for completion, grouped by category (optional).
        Leave blank and Claude will generate them in defining-requirements.
      placeholder: |
        ### Implementation
        - [ ] ...

        ### Testing
        - [ ] ...

        ### Finishing
        - [ ] Documentation consistency check
  - type: textarea
    id: completion-criteria
    attributes:
      label: Completion Criteria
      description: |
        All ACs must be GREEN, plus any technical completion criteria (optional).
        Leave blank and Claude will generate them in defining-requirements.
      placeholder: |
        - [ ] AC1-ACN all GREEN
        - [ ] Build passes with zero warnings
        - [ ] Existing tests (unit / snapshot / UI) all GREEN
  - type: textarea
    id: references
    attributes:
      label: References
      description: Related design documents or Issues
