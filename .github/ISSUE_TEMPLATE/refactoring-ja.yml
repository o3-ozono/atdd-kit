name: リファクタリング
description: バグ修正で発見されたアンチパターンの体系的な排除
labels: ["type:development", "refactoring"]
body:
  - type: checkboxes
    id: skills
    attributes:
      label: 適用スキルチェックリスト
      options:
        - label: "atdd-kit:discover — 要件・方針整理・AC 導出"
        - label: "テスト要否をユーザーに確認"
        - label: "atdd-kit:atdd — ATDD ダブルループ TDD"
        - label: "atdd-kit:verify — ローカル検証 + CI 検証"
        - label: "atdd-kit:ship — PR 作成・レビュー・マージ"
  - type: textarea
    id: origin
    attributes:
      label: 発見元バグ
      description: このリファクタリングのきっかけとなったバグ Issue と、そこで特定されたアンチパターンを記載する
      placeholder: |
        - 発見元: #XXX（バグの概要）
        - アンチパターン: （例: @State で長時間タスクの ViewModel を管理している）
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何をリファクタリングするか。該当ファイル・行番号・現在の問題・修正方針を記載する
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: |
        リファクタリングの完了条件を Given/When/Then 形式で記述する。
        「アンチパターンが排除されている」を具体的に検証可能な形にする。
      placeholder: |
        ### AC1: （AC名）
        - **Given:** （前提条件）
        - **When:** （操作）
        - **Then:** （期待結果）
    validations:
      required: true
  - type: textarea
    id: subtasks
    attributes:
      label: サブタスクチェックリスト
      description: |
        完了に必要な全サブタスクをチェックボックス形式で列挙する。
        カテゴリ別（実装、テスト、仕上げ等）にグルーピングする。
      placeholder: |
        ### 実装
        - [ ] ...

        ### テスト
        - [ ] ...

        ### 仕上げ
        - [ ] ドキュメント整合性チェック
    validations:
      required: true
  - type: textarea
    id: completion-criteria
    attributes:
      label: 完了条件
      description: |
        AC が全て GREEN であること + 技術的な完了条件を列挙する。
        検証可能な条件にする。
      placeholder: |
        - [ ] AC1〜ACN が全て GREEN
        - [ ] アンチパターンが排除されている
        - [ ] 既存テストが GREEN のまま
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 参照ドキュメント
      description: 関連する設計ドキュメント・ADR・Issue
