name: Research Task
description: Technical research, PoC, literature review, etc.
labels: ["type:research"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What you want to find out
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Research scope and exclusions
    validations:
      required: true
  - type: textarea
    id: completion-criteria
    attributes:
      label: Completion Criteria
      description: Verifiable completion criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
