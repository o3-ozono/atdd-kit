name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      config: ${{ steps.filter.outputs.config }}
      docs: ${{ steps.filter.outputs.docs }}
      skills: ${{ steps.filter.outputs.skills }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.swift'
              - '**/*.ts'
              - '**/*.js'
              - '**/*.py'
              - '**/*.go'
            docs:
              - '**/*.md'
              - 'docs/**'
            skills:
              - 'skills/**'
            tests:
              - 'tests/**'
            config:
              - 'templates/**'
              - '.claude/**'
              - 'scripts/**'
              - 'commands/**'
              - 'rules/**'
              - 'addons/**'
              - 'agents/**'
              - 'hooks/**'
              - '.claude-plugin/**'

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: echo "Configure your build command here"
      - name: Test
        run: echo "Configure your test command here"

  skill-tests:
    needs: changes
    if: needs.changes.outputs.skills == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install BATS
        run: |
          EXPECTED_SHA="b640ec3cf2c7c9cfc9e6351479261186f76eeec8" # v1.11.1
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::BATS integrity check failed: expected $EXPECTED_SHA, got $ACTUAL_SHA"
            exit 1
          fi
          sudo ./install.sh /usr/local
      - name: Run BATS tests
        run: bats tests/ addons/ios/tests/

  ci-gate:
    runs-on: ubuntu-latest
    needs: [changes, build-and-test, skill-tests]
    if: always()
    steps:
      - name: Check results
        if: |
          needs.build-and-test.result == 'failure' ||
          needs.skill-tests.result == 'failure'
        run: exit 1
