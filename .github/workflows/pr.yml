name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      config: ${{ steps.filter.outputs.config }}
      docs: ${{ steps.filter.outputs.docs }}
      skills: ${{ steps.filter.outputs.skills }}
      tests: ${{ steps.filter.outputs.tests }}
      headless: ${{ steps.filter.outputs.headless }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.swift'
              - '**/*.ts'
              - '**/*.js'
              - '**/*.py'
              - '**/*.go'
            docs:
              - '**/*.md'
              - 'docs/**'
            skills:
              - 'skills/**'
            tests:
              - 'tests/**'
            config:
              - 'templates/**'
              - '.claude/**'
              - 'scripts/**'
              - 'commands/**'
              - 'rules/**'
              - 'addons/**'
              - 'agents/**'
              - 'hooks/**'
              - '.claude-plugin/**'
            headless:
              # Narrow scope: trigger only when skills or the headless test
              # infrastructure itself changes. Keeps the replay job focused
              # and avoids flaky-looking churn from unrelated hooks/agents.
              - 'skills/**'
              - 'scripts/test-skills-headless.sh'
              - 'lib/skill_transcript_parser.sh'
              - 'lib/skill_assertion.sh'
              - 'lib/scenario_loader.sh'
              - 'tests/fixtures/headless/**'
              - 'tests/test_skill_transcript_parser.bats'
              - 'tests/test_skill_assertion.bats'
              - 'tests/test_headless_runner.bats'
              - 'tests/test_headless_exit_codes.bats'
              - 'tests/test_pr_workflow_headless.bats'
              - '.github/workflows/pr.yml'
              - '.github/workflows/headless-live.yml'

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build
        run: echo "Configure your build command here"
      - name: Test
        run: echo "Configure your test command here"

  skill-tests:
    needs: changes
    if: needs.changes.outputs.skills == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install BATS
        run: |
          EXPECTED_SHA="b640ec3cf2c7c9cfc9e6351479261186f76eeec8" # v1.11.1
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::BATS integrity check failed: expected $EXPECTED_SHA, got $ACTUAL_SHA"
            exit 1
          fi
          sudo ./install.sh /usr/local
      - name: Run BATS tests
        run: bats tests/ addons/ios/tests/ addons/discord/tests/

  headless-replay:
    needs: changes
    if: needs.changes.outputs.headless == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Verify jq
        run: |
          jq --version
      - name: Install BATS
        run: |
          EXPECTED_SHA="b640ec3cf2c7c9cfc9e6351479261186f76eeec8" # v1.11.1
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::BATS integrity check failed: expected $EXPECTED_SHA, got $ACTUAL_SHA"
            exit 1
          fi
          sudo ./install.sh /usr/local
      - name: Run headless replay BATS
        # Replay-only: no `claude` binary required, no token spend, fully
        # deterministic. Live tests are dispatched via headless-live.yml.
        run: |
          bats \
            tests/test_skill_transcript_parser.bats \
            tests/test_skill_assertion.bats \
            tests/test_headless_runner.bats \
            tests/test_headless_exit_codes.bats

  skill-e2e-test:
    needs: changes
    if: needs.changes.outputs.skills == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    # Dry-run only: resolves the impacted Skill E2E Test set and writes a log,
    # but does NOT invoke `claude` — zero token spend, no ANTHROPIC_API_KEY
    # secret required. Per #222 the PR flow is supplementary verification;
    # real live execution is dispatched via skill-e2e-live.yml (workflow_dispatch).
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Resolve changed files
        id: changed
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename' | paste -sd, -)
          echo "files=${files}" >> "$GITHUB_OUTPUT"
      - name: Skill E2E Test impact (dry-run)
        run: |
          changed="${{ steps.changed.outputs.files }}"
          if [ -z "$changed" ]; then
            echo "No changed files resolved; nothing to map."
            exit 0
          fi
          scripts/run-skill-e2e.sh --changed-files "$changed" --dry-run
      - name: Upload Skill E2E Test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skill-e2e-dry-run-logs
          path: tests/e2e/.logs/*.log
          if-no-files-found: ignore
          retention-days: 7

  ci-gate:
    runs-on: ubuntu-latest
    needs: [changes, build-and-test, skill-tests, headless-replay, skill-e2e-test]
    if: always()
    steps:
      - name: Check results
        if: |
          needs.build-and-test.result == 'failure' ||
          needs.skill-tests.result == 'failure' ||
          needs.headless-replay.result == 'failure' ||
          needs.skill-e2e-test.result == 'failure'
        run: exit 1
