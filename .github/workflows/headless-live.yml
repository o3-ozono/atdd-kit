name: Headless Skill Test (Live)

# Live skill-chain verification. Invokes `claude -p --output-format stream-json`
# against a real API and spends tokens; therefore gated to manual dispatch.
# The PR flow (pr.yml / headless-replay) covers regression with committed
# fixtures — this workflow exists for periodic drift checks and fixture
# re-recording.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario spec JSON path (relative to repo root)"
        required: true
        default: "tests/fixtures/headless/skill-gate-discover.happy.scenario.json"
      model:
        description: "Override scenario.model (optional; leave blank to use scenario value)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify API key present
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is required for live runs."
            exit 1
          fi

      - name: Verify jq
        run: jq --version

      - name: Install Claude Code CLI
        # AC7 (Issue #125): integrity-pinning via SHA or release-asset download was
        # investigated but github.com/anthropics/claude-code/releases has no binary
        # assets (all releases have empty assets as of 2026-04-21). The install script
        # at claude.ai/install.sh is the only supported distribution channel.
        # TODO: re-evaluate when Anthropic publishes release assets or a checksum file.
        # Until then, `curl | bash` is the only viable option; the `actions/checkout`
        # step above is SHA-pinned to limit supply-chain risk on the repo side.
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify claude binary
        run: |
          claude --version

      - name: Run headless live scenario
        run: |
          scenario="${{ inputs.scenario }}"
          model_override="${{ inputs.model }}"
          if [ -n "$model_override" ]; then
            # Override scenario.model in a temp copy (non-destructive).
            tmp_scenario=$(mktemp --suffix=.json)
            jq --arg m "$model_override" '.model = $m' "$scenario" > "$tmp_scenario"
            scenario="$tmp_scenario"
          fi
          bash scripts/test-skills-headless.sh "$scenario"

      # AC6 (Issue #125): artifact is populated only on assertion failure (if: failure()).
      # The glob /tmp/headless-*/* captures both transcript.jsonl and claude.stderr
      # so that stderr output from the CLI is also available for debugging.
      # To keep artifacts on every run (pass or fail), set HEADLESS_KEEP_ON_FAIL=all
      # in the env block above and remove the `if: failure()` condition.
      - name: Upload transcript on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: headless-live-transcript
          path: /tmp/headless-*/*
          if-no-files-found: ignore
          retention-days: 7
